<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; background: transparent; }
      #i { display: block; }
    </style>
  </head>
  <body>
    <img id="i" src="logo.svg" />
    <script>
      const s = Number(new URLSearchParams(location.search).get("s")) || 128;
      const i = document.getElementById("i");
      i.width = s;
      i.height = s;
    </script>
  </body>
</html>
